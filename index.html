<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketch Map - PMT Emergencias</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
  <select id="iconSelector" onchange="selectIcon(this.value)">
    <option value="">🚩 Seleccionar señal</option>
    <option value="banderero">👷 Banderero</option>
    <option value="colombinas">🚧 Colombinas</option>
    <option value="desvio">↪️ Desvío</option>
    <option value="imag01">📍 Indicador 01</option>
    <option value="imag02">📍 Indicador 02</option>
    <option value="obra">⚠️ Obra en vía</option>
    <option value="velocidad">🚫 Velocidad (30)</option>
  </select>

  <button onclick="exportPDF()">📄 Exportar PDF</button>
  <button onclick="clearMap()">🧹 Limpiar</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="app.js"></script>

</body>
</html>
